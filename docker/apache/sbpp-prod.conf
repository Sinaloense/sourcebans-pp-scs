# SourceBans++ production Apache hardening (#1381).
#
# Loaded as /etc/apache2/conf-available/zz-sbpp-prod.conf via a2enconf
# in docker/Dockerfile.prod. The `zz-` prefix wins specificity over
# vendor defaults shipped by php:8.5-apache.
#
# Scope:
#   - Forbid directory listings everywhere under DocumentRoot.
#   - Deny access to dotfiles (.git, .env, .htaccess, ...).
#   - Deny access to internal directories the panel reads but no
#     external user should hit (vendor/, cache/, install/, updater/,
#     configs/, includes/).
#   - Document-root scoped, never global. A panel installed under a
#     subpath is unsupported on this image (operators should use the
#     reverse-proxy / Caddy stub for path-based deploys; the image
#     assumes the panel owns the root).

<Directory "${APACHE_DOCUMENT_ROOT}">
    Options -Indexes -MultiViews +FollowSymLinks
    AllowOverride None
    Require all granted
</Directory>

# Block dotfiles globally — `.env`, `.git/*`, `.htaccess`, `.DS_Store`.
# Some self-hosters mount their `.env` into the panel root by accident
# (or carry a stray `.git/` from `git clone` rather than the release
# zip); this is the belt-and-suspenders so leaks like that aren't
# fetchable.
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# Internal directories — the panel reads these via PHP (`require_once`);
# nothing legitimate fetches a URL inside them. Pre-image, self-hosters
# either knew to copy the release tarball's `.htaccess` files (a
# trap — easy to miss on a fresh upload) or relied on `vendor/` /
# `configs/` not being indexed by accident. Both fragile; codify here.
<DirectoryMatch "^${APACHE_DOCUMENT_ROOT}/(includes|configs)(/|$)">
    Require all denied
</DirectoryMatch>

# `install/` and `updater/` are removed from the writable layer by the
# entrypoint after first-boot install / pending migrations complete
# (web/init-recovery.php's guard refuses to boot if either is on disk
# and `SBPP_DEV_KEEP_INSTALL` is not defined; the prod image MUST NOT
# define that constant). The deny-rules below are belt-and-suspenders
# for the brief window during boot when the directories still exist
# and Apache is also up (it isn't — entrypoint's `exec
# apache2-foreground` runs AFTER the rm -rf), and for any
# bind-mount-overlay / volume-overlay shape that re-exposes the
# directories.
<DirectoryMatch "^${APACHE_DOCUMENT_ROOT}/(install|updater)(/|$)">
    Require all denied
</DirectoryMatch>

# `cache/` is the Smarty compile + sessions dir. Nothing under it is
# meant to be served — Smarty templates compile to `.tpl.php` files
# which would expose template internals if accidentally indexed.
# The compile-dir contents include serialised session data under
# `cache/sessions/`.
<DirectoryMatch "^${APACHE_DOCUMENT_ROOT}/(cache|templates_c)(/|$)">
    Require all denied
</DirectoryMatch>

# `config.php` is the install-state sentinel. It carries DB credentials,
# the JWT secret key, and the Steam API key. Never serve it.
<Files "config.php">
    Require all denied
</Files>

# `composer.json` / `composer.lock` are checked-in but should never be
# fetched (they reveal exact dependency versions for vulnerability
# scanning). Same for the project's own root-level helpers
# (`phpstan.neon`, `phpunit.xml.dist`, `package.json`, `tsconfig.json`).
#
# IMPORTANT: every basename listed here must be a panel-root-only
# config file with NO published browser asset sharing the basename.
# `<FilesMatch>` matches the basename component regardless of which
# directory the request resolves to, so a pattern like
# `api-contract\..*` would also match the published `/scripts/api-contract.js`
# the chrome loads from `core/header.tpl` — silently 403'ing it and
# breaking every `sb.api.call(Actions.PascalName, …)` site in the
# panel JS (login spinner runs forever, all admin row actions are
# dead). See #1419 for the bug class. Prefer adding new deny rules
# to a `<Files "exact-name">` block (panel-root only) when the
# protected file has a unique basename, or to a path-anchored
# `<LocationMatch "^/exact-path$">` block when basename collisions
# are a real concern.
<FilesMatch "(?i)^(composer\.(json|lock)|phpstan\..*|phpunit\.xml.*|package\.json|tsconfig\.json)$">
    Require all denied
</FilesMatch>

# Forward the actual client IP via mod_remoteip. By default this is a
# no-op — the per-deploy trust list is configured by the entrypoint
# from the SBPP_TRUSTED_PROXIES env var. The directive is loaded here
# so the entrypoint's per-deploy conf only has to add `RemoteIPInternalProxy`
# lines (the header name is project-wide constant).
RemoteIPHeader X-Forwarded-For
