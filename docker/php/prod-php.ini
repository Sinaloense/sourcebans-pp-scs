; SourceBans++ production PHP tuning (#1381).
;
; Loaded as /usr/local/etc/php/conf.d/zz-sbpp-prod.ini in the runtime
; image; the `zz-` prefix wins specificity over any vendor default
; conf shipped by php:8.5-apache. See docker/Dockerfile.prod.
;
; Conservative-by-default: anything that touches per-request behaviour
; (display_errors, OPcache file checks, file-upload size) is set explicitly
; rather than relying on the upstream php.ini.
;
; The dev image's settings (display_errors=On, opcache.revalidate_freq=0,
; auto_prepend_file=dev-prepend.php) are deliberately absent. The dev
; image opts INTO chatty errors + per-request file-checks + a constant
; that bypasses init.php's install-presence guard. None of those make
; sense on a production panel.

; ---------------------------------------------------------------------------
; Errors
; ---------------------------------------------------------------------------

; 12-factor: emit errors to the orchestrator's stderr, never to the
; HTML response body. `display_errors=On` would leak file paths,
; SQL fragments, and stack traces to anyone who tickled a panel
; error — a small but real information-disclosure surface.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; The panel's own `sbError` handler (init.php) routes E_USER_*
; notices into the audit log. Everything else goes to stderr.
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Don't tell the world this is PHP / which version.
expose_php = Off

; ---------------------------------------------------------------------------
; Limits
; ---------------------------------------------------------------------------

memory_limit = 256M
max_execution_time = 60
post_max_size = 32M
upload_max_filesize = 32M

; Sessions live on disk by default (Smarty's compile dir + cache dir
; are on the `cache` volume, which carries `cache/sessions/`). Cookie
; lifetime, samesite, and secure flag are managed by the panel (Auth
; module); the ini-level defaults below are fallbacks for any code
; that calls session_start() outside Auth.
session.cookie_httponly = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.gc_maxlifetime = 86400

; ---------------------------------------------------------------------------
; OPcache (production knobs)
; ---------------------------------------------------------------------------
;
; The dev image runs with revalidate_freq=0 so file edits are picked
; up on the next request — perfect for development, terrible for
; production (every request stat()s every loaded file, killing perf
; under any non-trivial load).
;
; Production: validate_timestamps=0 means OPcache NEVER re-checks
; files on disk. The image is immutable; a `docker compose pull &&
; up -d` cycle replaces the container, which is the correct
; invalidation event. If a self-hoster needs to in-place edit a
; file (third-party theme tweak, etc.) and pick it up without a
; container restart, they can `docker compose exec web php -r
; 'opcache_reset();'` — but that's the rare exception, not the
; happy path.

opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
; Web includes ~3.5k vendor files + ~1.5k panel files; round up.
opcache.max_accelerated_files = 6000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1
opcache.save_comments = 1

; JIT — disabled by default on production because the gain is small for
; a request-response panel like SourceBans++ and the surface for jit
; bugs is non-zero. Self-hosters can flip this on by overriding the
; conf via a bind-mounted `*.ini`; keeping the default conservative.
opcache.jit_buffer_size = 0

; ---------------------------------------------------------------------------
; Date
; ---------------------------------------------------------------------------

; UTC by default — orchestrator-timestamped logs land in the same
; timezone the audit log writes ints (every panel `created` column is
; a unix epoch, timezone-agnostic). Self-hosters override via the
; `TZ` env var (read by libc; PHP follows automatically) when they
; want local-time stderr.
date.timezone = "UTC"
